blueprint:
  name: Doorbell – Multi Device Alert System (v2.1.3)
  description: >
    Unified doorbell alert system with snapshot, speaker TTS, phone notification,
    and TV overlay. Includes cache-busting, safe Sonos volume restore, and
    continue-on-error for TTS and TV overlay.
  domain: automation
  source_url: https://raw.githubusercontent.com/bradbowles/Blueprints-Doorbell-Multi-Device-Alert-System/main/Blueprint/doorbell_multi_device_alert.yaml

  input:

    ding_sensor:
      name: Doorbell Ding Sensor
      selector:
        entity:
          domain: binary_sensor

    motion_sensor:
      name: Motion Sensor (optional)
      default: ""
      optional: true
      selector:
        entity:
          domain: binary_sensor

    person_sensor:
      name: Person Detection Sensor (optional)
      default: ""
      optional: true
      selector:
        entity:
          domain: binary_sensor

    snapshot_switch:
      name: Snapshot Trigger Switch
      selector:
        entity:
          domain: switch

    camera_entity:
      name: Camera
      selector:
        entity:
          domain: camera

    speaker_enabled:
      name: Enable Speaker Announcement
      default: false
      selector:
        boolean: {}

    speaker_target:
      name: Speaker(s)
      default: []
      selector:
        target:
          entity:
            domain: media_player

    tts_engine:
      name: TTS Engine
      default: tts.google_en_com
      selector:
        entity:
          domain: tts

    tts_message:
      name: TTS Message
      default: "Someone is at the front door"
      selector:
        text: {}

    tts_volume:
      name: TTS Volume
      default: 0.35
      selector:
        number:
          min: 0
          max: 1
          step: 0.01

    phone_enabled:
      name: Enable Phone Notification
      default: true
      selector:
        boolean: {}

    phone_notify_service:
      name: Phone Notify Service
      selector:
        text: {}

    phone_title:
      name: Phone Notification Title
      default: "Doorbell Alert"
      selector:
        text: {}

    phone_message:
      name: Phone Notification Message
      default: "Someone is at the front door."
      selector:
        text: {}

    phone_include_snapshot:
      name: Include Snapshot in Phone Notification
      default: true
      selector:
        boolean: {}

    tv_enabled:
      name: Enable TV Overlay
      default: false
      selector:
        boolean: {}

    tv_caption:
      name: TV Caption
      default: "Someone is at the front door"
      selector:
        text: {}

    tv_duration:
      name: TV Display Duration (seconds)
      default: 10
      selector:
        number:
          min: 1
          max: 60
          step: 1

    pause_condition:
      name: Pause Condition (optional)
      default: []
      selector:
        condition: {}

mode: single

trigger:
  - platform: state
    entity_id: !input ding_sensor
    to: "on"
  - platform: state
    entity_id: !input motion_sensor
    to: "on"
  - platform: state
    entity_id: !input person_sensor
    to: "on"

condition: !input pause_condition

variables:
  snapshot_path: "/config/www/temp/doorbell_snapshot.jpg"
  snapshot_url: "http://{{ states('sensor.local_ip') }}:8123/local/temp/doorbell_snapshot.jpg?{{ now().timestamp() }}"
  speaker_enabled: !input speaker_enabled
  speaker_target: !input speaker_target
  tts_engine: !input tts_engine
  tts_message: !input tts_message
  tts_volume: !input tts_volume
  phone_enabled: !input phone_enabled
  phone_notify_service: !input phone_notify_service
  phone_title: !input phone_title
  phone_message: !input phone_message
  phone_include_snapshot: !input phone_include_snapshot
  tv_enabled: !input tv_enabled
  tv_caption: !input tv_caption
  tv_duration: !input tv_duration

action:

  # Trigger snapshot
  - service: switch.turn_on
    target:
      entity_id: !input snapshot_switch

  - delay: "00:00:02"

  # Save snapshot
  - service: camera.snapshot
    data:
      filename: "{{ snapshot_path }}"
    target:
      entity_id: !input camera_entity

  - delay: "00:00:01"

  # Speaker announcement (continue on error)
  - choose:
      - conditions: "{{ speaker_enabled }}"
        sequence:
          - continue_on_error: true
            sequence:
              - variables:
                  safe_volume: >
                    {% set v = state_attr(speaker_target.entity_id[0], 'volume_level') %}
                    {% if v is number %}
                      {{ v }}
                    {% else %}
                      0.35
                    {% endif %}
              - service: media_player.volume_set
                target: !input speaker_target
                data:
                  volume_level: "{{ tts_volume }}"
              - service: tts.speak
                data:
                  cache: true
                  media_player_entity_id: "{{ speaker_target.entity_id[0] }}"
                  message: "{{ tts_message }}"
                target:
                  entity_id: "{{ tts_engine }}"
              - delay: "00:00:02"
              - service: media_player.volume_set
                target: !input speaker_target
                data:
                  volume_level: "{{ safe_volume }}"

  # TV overlay (continue on error)
  - choose:
      - conditions: "{{ tv_enabled }}"
        sequence:
          - continue_on_error: true
            sequence:
              - service: rest_command.tvoverlay_doorbell
                data:
                  caption: "{{ tv_caption }}"
                  image_path: "{{ snapshot_url }}"
                  duration: "{{ tv_duration }}"

  # Phone notification (always runs)
  - choose:
      - conditions: "{{ phone_enabled }}"
        sequence:
          - service: "{{ phone_notify_service }}"
            data:
              title: "{{ phone_title }}"
              message: "{{ phone_message }}"
              data:
                image: "{{ snapshot_url if phone_include_snapshot else '' }}"
