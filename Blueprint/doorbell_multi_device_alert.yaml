blueprint:
  name: Doorbell - Multi-Device Alert System
  description: >
    Sends snapshot, Sonos chime + TTS, phone notification, and TV image display
    (via media source casting) when the doorbell is triggered.
  domain: automation

  input:
    doorbell_trigger:
      name: Doorbell Trigger (ding)
      description: >
        Select the binary_sensor that turns ON when the doorbell button is pressed.
        For Aarlo, this is typically binary_sensor.aarlo_ding_video_doorbell.
      selector:
        entity:
          domain: binary_sensor

    snapshot_switch:
      name: Snapshot Trigger Switch
      description: >
        Select the switch that forces your doorbell camera to take a snapshot.
        For Aarlo, this is switch.aarlo_snapshot_video_doorbell.
      selector:
        entity:
          domain: switch

    camera_entity:
      name: Doorbell Camera
      description: >
        Select the camera entity used to capture the snapshot.
        For Aarlo, this is camera.aarlo_video_doorbell.
      selector:
        entity:
          domain: camera

    sonos_group:
      name: Sonos Group
      description: >
        Select the Sonos media_player group that should play the chime and TTS announcement.
      selector:
        entity:
          domain: media_player

    sonos_volume:
      name: Sonos Volume
      description: Set the volume level for the announcement.
      default: 0.35
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: slider

    phone_notify_service:
      name: Phone Notify Service
      description: >
        Enter the notify service for your phone (e.g. notify.mobile_app_brads_fold_6).
        This will receive the snapshot and alert message.
      selector:
        text:

    tv_group:
      name: TV Media Player Group
      description: >
        Select the media_player group containing your Google TV / Chromecast devices.
        Only TVs that are ON and available will receive the image cast.
      selector:
        entity:
          domain: media_player

    tts_engine:
      name: TTS Engine
      description: >
        Select the TTS engine used for the spoken announcement.
        Example: tts.google_en_com.
      selector:
        entity:
          domain: tts

    chime_file:
      name: Chime File (optional, /media or /local path)
      description: >
        Optional: Provide a path to a chime sound to play before the TTS message.
        Leave blank to disable the chime.
      default: ""
      selector:
        text:

    enable_pip:
      name: Enable TV Image Cast
      description: >
        When enabled, the snapshot will be cast as an image to all active TVs
        using the media source system.
      default: true
      selector:
        boolean:

mode: single

trigger:
  - platform: state
    entity_id: !input doorbell_trigger
    to: "on"

action:
  # 1. Trigger snapshot
  - service: switch.turn_on
    target:
      entity_id: !input snapshot_switch

  - delay: "00:00:04"

  - service: camera.snapshot
    target:
      entity_id: !input camera_entity
    data:
      filename: "/media/doorbell/doorbell_snapshot.jpg"

  # Optional: adjust path/permissions via shell_command if you use one
  # - service: shell_command.fix_doorbell_snapshot

  # 2. Resolve inputs into usable variables
  - variables:
      # Media Source path (no querystring; media_source handles latest file)
      snapshot_media_source: "media-source://media_source/local/doorbell/doorbell_snapshot.jpg"
      tv_group_entity: !input tv_group
      chime_file_value: !input chime_file
      phone_notify_target: !input phone_notify_service
      enable_pip_value: !input enable_pip

  # 3. Expand TV group safely (runtime-safe)
  - variables:
      tvs: >
        {{ expand(tv_group_entity)
           | selectattr('state','eq','on')
           | selectattr('state','ne','unavailable')
           | map(attribute='entity_id')
           | list }}

  # 4. Optional chime
  - choose:
      - conditions: "{{ chime_file_value | length > 0 }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: !input sonos_group
            data:
              media_content_id: "{{ chime_file_value }}"
              media_content_type: music

  # 5. Set Sonos volume
  - service: media_player.volume_set
    target:
      entity_id: !input sonos_group
    data:
      volume_level: !input sonos_volume

  # 6. Sonos TTS announcement
  - service: tts.speak
    target:
      entity_id: !input tts_engine
    data:
      cache: true
      media_player_entity_id: !input sonos_group
      message: "Someone is at the front door"
      language: en-US

  # 7. Phone notification (dynamic service call)
  - choose:
      - conditions: "{{ phone_notify_target is string and phone_notify_target | length > 0 }}"
        sequence:
          - service: "{{ phone_notify_target }}"
            data:
              title: "Front Door Alert"
              message: "Someone is at the front door"
              data:
                # Use the media URL if your phone app supports it; otherwise this can be omitted
                image: "/media/local/doorbell/doorbell_snapshot.jpg"

  # 8. TV image cast via Media Source
  - choose:
      - conditions: "{{ enable_pip_value and (tvs | count > 0) }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: "{{ tvs }}"
            data:
              media_content_id: "{{ snapshot_media_source }}"
              media_content_type: image/jpeg
