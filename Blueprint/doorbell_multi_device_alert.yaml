blueprint:
  name: Doorbell - Multi-Device Alert System
  description: >
    Sends snapshot, Sonos chime + TTS, phone notification, TV image notification,
    and optional PiP-style overlay when the doorbell is triggered.
  domain: automation

  input:
    doorbell_trigger:
      name: Doorbell Trigger (ding)
      description: >
        Select the binary_sensor that turns ON when the doorbell button is pressed.
        For Aarlo, this is typically binary_sensor.aarlo_ding_video_doorbell.
      selector:
        entity:
          domain: binary_sensor

    snapshot_switch:
      name: Snapshot Trigger Switch
      description: >
        Select the switch that forces your doorbell camera to take a snapshot.
        For Aarlo, this is switch.aarlo_snapshot_video_doorbell.
      selector:
        entity:
          domain: switch

    camera_entity:
      name: Doorbell Camera
      description: >
        Select the camera entity used to capture the snapshot.
        For Aarlo, this is camera.aarlo_video_doorbell.
      selector:
        entity:
          domain: camera

    sonos_group:
      name: Sonos Group
      description: >
        Select the Sonos media_player group that should play the chime and TTS announcement.
      selector:
        entity:
          domain: media_player

    phone_notify_service:
      name: Phone Notify Service
      description: >
        Enter the notify service for your phone (e.g. notify.mobile_app_brads_fold_6).
        This will receive the snapshot and alert message.
      selector:
        text:

    tv_group:
      name: TV Media Player Group
      description: >
        Select the media_player group containing your Google TV / Chromecast devices.
        Only TVs that are ON and available will receive notifications.
      selector:
        entity:
          domain: media_player

    tts_engine:
      name: TTS Engine
      description: >
        Select the TTS engine used for the spoken announcement.
        Example: tts.google_en_com.
      selector:
        entity:
          domain: tts

    chime_file:
      name: Chime File (optional, /local path)
      description: >
        Optional: Provide a /local/ path to a chime sound to play before the TTS message.
        Leave blank to disable the chime.
      default: ""
      selector:
        text:

    enable_pip:
      name: Enable PiP-style Overlay (HTML page cast)
      description: >
        When enabled, the snapshot will be cast as a picture-in-picture overlay
        to all active TVs using /local/pip.html.
      default: false
      selector:
        boolean:

mode: single

trigger:
  - platform: state
    entity_id: !input doorbell_trigger
    to: "on"

action:

  # 1. Trigger snapshot
  - service: switch.turn_on
    target:
      entity_id: !input snapshot_switch

  - delay: "00:00:04"

  - service: camera.snapshot
    target:
      entity_id: !input camera_entity
    data:
      filename: "/config/www/temp/doorbell_snapshot.jpg"

  - service: shell_command.fix_doorbell_snapshot

  # 2. Resolve inputs into usable variables
  - variables:
      snapshot_url: "/local/temp/doorbell_snapshot.jpg?{{ now().timestamp() }}"
      tv_group_entity: !input tv_group

  # 3. Expand TV group safely (runtime-safe)
  - variables:
      tvs: >
        {{ expand(tv_group_entity)
           | selectattr('state','eq','on')
           | selectattr('state','ne','unavailable')
           | map(attribute='entity_id')
           | list }}

  # 4. Optional chime
  - choose:
      - conditions: "{{ (inputs.chime_file | length) > 0 }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: !input sonos_group
            data:
              media_content_id: "{{ inputs.chime_file }}"
              media_content_type: music

  # 5. Sonos TTS announcement
  - service: tts.speak
    target:
      entity_id: !input tts_engine
    data:
      cache: true
      media_player_entity_id: !input sonos_group
      message: "Someone is at the front door"
      language: en-au

  # 6. Phone notification (safe pattern)
  - service: notify.notify
    data:
      target: "{{ inputs.phone_notify_service }}"
      title: "Front Door Alert"
      message: "Someone is at the front door"
      data:
        image: "{{ snapshot_url }}"
        clickAction: "/our-home/security"

  # 7. TV image notification
  - choose:
      - conditions: "{{ tvs | count > 0 }}"
        sequence:
          - repeat:
              for_each: "{{ tvs }}"
              sequence:
                - service: notify.notify
                  data:
                    target: "{{ repeat.item }}"
                    data:
                      image: "{{ snapshot_url }}"

  # 8. PiP overlay (optional)
  - choose:
      - conditions: "{{ inputs.enable_pip and (tvs | count > 0) }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: "{{ tvs }}"
            data:
              media_content_id: "/local/pip.html?img={{ snapshot_url }}"
              media_content_type: url
