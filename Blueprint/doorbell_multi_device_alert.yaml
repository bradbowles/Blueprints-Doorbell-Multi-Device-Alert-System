blueprint:
  name: Doorbell - Multi Device Alert System (v2.1.3)
  description: >
    Sends snapshot, optional speaker chime and single-shot TTS, optional phone
    notification, and optional TV overlay notification with adjustable display
    duration when the doorbell is triggered by ding, motion, or person detection.
    Includes a dynamic pause condition using Home Assistant's native condition selector.
    v2.1.3 adds dynamic snapshot URL via base_url input, cache-busting, safe TTS volume
    restore, continue_on_error for TTS and TV overlay, and improved snapshot timing.

  domain: automation

  input:

    #################################################################
    # 0. Base URL (NEW in v2.1.3)
    #################################################################

    base_url:
      name: Home Assistant Base URL
      description: "Example: http://homeassistant.local:8123"
      default: "http://homeassistant.local:8123"
      selector:
        text:

    #################################################################
    # 1. Pause Logic
    #################################################################

    pause_condition:
      name: Pause - Condition to pause automation
      default: []
      selector:
        condition:

    #################################################################
    # 2. Trigger Inputs (Ding, Motion, Person)
    #################################################################

    doorbell_trigger:
      name: Doorbell - Ding sensor
      description: >
        Binary sensor that fires when the doorbell button is pressed.
      default: []
      selector:
        entity:
          domain: binary_sensor

    motion_trigger:
      name: Doorbell - Motion sensor
      description: >
        Binary sensor that fires when motion is detected.
      default: []
      selector:
        entity:
          domain: binary_sensor

    person_trigger:
      name: Doorbell - Person detection sensor
      description: >
        Binary sensor that fires when a person is detected.
      default: []
      selector:
        entity:
          domain: binary_sensor

    #################################################################
    # 3. Snapshot Inputs
    #################################################################

    snapshot_switch:
      name: Snapshot - Trigger switch
      selector:
        entity:
          domain: switch

    camera_entity:
      name: Snapshot - Camera entity
      selector:
        entity:
          domain: camera

    #################################################################
    # 4. Speaker Announcement
    #################################################################

    speaker_enable:
      name: Speaker - Enable announcement
      default: true
      selector:
        boolean:

    speaker_targets:
      name: Speaker - Media players
      selector:
        entity:
          domain: media_player
          multiple: true

    speaker_tts_engine:
      name: Speaker - TTS engine
      selector:
        entity:
          domain: tts

    speaker_tts_message:
      name: Speaker - TTS message
      default: Someone is at the front door
      selector:
        text:
          multiline: true

    speaker_volume:
      name: Speaker - Volume level
      default: 0.35
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: slider

    speaker_chime_enable:
      name: Speaker - Enable chime
      default: false
      selector:
        boolean:

    speaker_chime_file:
      name: Speaker - Chime file
      default: ""
      selector:
        text:
          multiline: true

    #################################################################
    # 5. Phone Notification
    #################################################################

    phone_enable:
      name: Phone - Enable notification
      default: true
      selector:
        boolean:

    phone_notify_service:
      name: Phone - Notify service
      default: ""
      selector:
        text:

    phone_title:
      name: Phone - Notification title
      default: Front Door Alert
      selector:
        text:
          multiline: true

    phone_message:
      name: Phone - Notification message
      default: Someone is at the front door
      selector:
        text:
          multiline: true

    phone_include_snapshot:
      name: Phone - Include snapshot
      default: true
      selector:
        boolean:

    #################################################################
    # 6. TV Overlay
    #################################################################

    tv_enable:
      name: TV - Enable overlay
      default: true
      selector:
        boolean:

    tv_caption:
      name: TV - Caption
      default: Someone is at the front door
      selector:
        text:
          multiline: true

    tv_include_snapshot:
      name: TV - Include snapshot
      default: true
      selector:
        boolean:

    tv_duration:
      name: TV - Display duration (seconds)
      default: 10
      selector:
        number:
          min: 1
          max: 60
          step: 1
          mode: slider

mode: single

#################################################################
#  TRIGGERS — Ding OR Motion OR Person
#################################################################

trigger:
  - platform: state
    entity_id: !input doorbell_trigger
    to: "on"

  - platform: state
    entity_id: !input motion_trigger
    to: "on"

  - platform: state
    entity_id: !input person_trigger
    to: "on"

action:

  #################################################################
  # 0. Pause Logic
  #################################################################

  - choose:
      - conditions: !input pause_condition
        sequence:
          - stop: Automation paused because the pause condition matched.

  #################################################################
  # 1. Trigger snapshot switch
  #################################################################

  - service: switch.turn_on
    target:
      entity_id: !input snapshot_switch

  #################################################################
  # 2. Wait for snapshot routine
  #################################################################

  - delay: 00:00:06

  #################################################################
  # 3. Save snapshot
  #################################################################

  - service: camera.snapshot
    target:
      entity_id: !input camera_entity
    data:
      filename: /config/www/temp/doorbell_snapshot.jpg

  #################################################################
  # 4. Variables (v2.1.3 upgrades included)
  #################################################################

  - variables:
      base_url: !input base_url

      speaker_enable_flag: !input speaker_enable
      speaker_targets_list: !input speaker_targets
      speaker_tts_engine_entity: !input speaker_tts_engine
      speaker_tts_message_value: !input speaker_tts_message
      speaker_volume_value: !input speaker_volume
      speaker_chime_enable_flag: !input speaker_chime_enable
      speaker_chime_file_value: !input speaker_chime_file

      phone_enable_flag: !input phone_enable
      phone_notify_target: !input phone_notify_service
      phone_title_value: !input phone_title
      phone_message_value: !input phone_message
      phone_include_snapshot_flag: !input phone_include_snapshot

      tv_enable_flag: !input tv_enable
      tv_caption_value: !input tv_caption
      tv_include_snapshot_flag: !input tv_include_snapshot
      tv_duration_value: !input tv_duration

      primary_speaker: >
        {% set s = speaker_targets_list %}
        {% if s is string %}
          {{ s }}
        {% elif s is iterable and s | length > 0 %}
          {{ s[0] }}
        {% else %}
          {{ "" }}
        {% endif %}

      original_speaker_volume: >
        {% if primary_speaker != "" %}
          {{ state_attr(primary_speaker, "volume_level") | default(0.35) }}
        {% else %}
          0.35
        {% endif %}

      # ⭐ Dynamic snapshot URL with cache-buster (NO hass reference)
      image_path: >
        {{ base_url ~ '/local/temp/doorbell_snapshot.jpg?' ~ now().timestamp() }}

  #################################################################
  # 5. Speaker Announcement (Single-shot TTS)
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ speaker_enable_flag and primary_speaker != '' }}"
        sequence:

          # Optional chime
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ speaker_chime_enable_flag and speaker_chime_file_value | length > 0 }}
                sequence:
                  - continue_on_error: true
                    sequence:
                      - service: media_player.play_media
                        target:
                          entity_id: "{{ speaker_targets_list }}"
                        data:
                          media_content_id: "{{ speaker_chime_file_value }}"
                          media_content_type: music

          # Set temporary volume
          - continue_on_error: true
            sequence:
              - service: media_player.volume_set
                target:
                  entity_id: "{{ speaker_targets_list }}"
                data:
                  volume_level: "{{ speaker_volume_value }}"

          # Single TTS attempt
          - continue_on_error: true
            sequence:
              - service: tts.speak
                target:
                  entity_id: "{{ speaker_tts_engine_entity }}"
                data:
                  cache: true
                  media_player_entity_id: "{{ speaker_targets_list }}"
                  message: "{{ speaker_tts_message_value }}"
                  language: en-US

          # Allow playback to start before restoring volume
          - delay: 00:00:03

          # Restore original volume
          - continue_on_error: true
            sequence:
              - service: media_player.volume_set
                target:
                  entity_id: "{{ speaker_targets_list }}"
                data:
                  volume_level: "{{ original_speaker_volume }}"

  #################################################################
  # 6. Phone Notification
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ phone_enable_flag and phone_notify_target | length > 0 }}
        sequence:

          # With snapshot
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ phone_include_snapshot_flag }}"
                sequence:
                  - service: "{{ phone_notify_target }}"
                    data:
                      title: "{{ phone_title_value }}"
                      message: "{{ phone_message_value }}"
                      data:
                        image: "{{ image_path }}"

            # Without snapshot
            default:
              - service: "{{ phone_notify_target }}"
                data:
                  title: "{{ phone_title_value }}"
                  message: "{{ phone_message_value }}"

  #################################################################
  # 7. TV Overlay
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ tv_enable_flag }}"
        sequence:

          # Small delay to ensure snapshot is fully written
          - delay: 00:00:01

          # With snapshot
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ tv_include_snapshot_flag }}"
                sequence:
                  - continue_on_error: true
                    sequence:
                      - service: rest_command.tvoverlay_doorbell
                        data:
                          caption: "{{ tv_caption_value }}"
                          image_path: "{{ image_path }}"
                          duration: "{{ tv_duration_value | int }}"

            # Without snapshot
            default:
              - continue_on_error: true
                sequence:
                  - service: rest_command.tvoverlay_doorbell
                    data:
                      caption: "{{ tv_caption_value }}"
                      image_path: ""
                      duration: "{{ tv_duration_value | int }}"
