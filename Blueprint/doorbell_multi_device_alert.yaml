blueprint:
  name: Doorbell - Multi-Device Alert System (TvOverlay, UI-Safe)
  description: >
    Sends snapshot, Sonos chime + TTS (with retry), phone notification,
    and TvOverlay notification on the TV when the doorbell is triggered.
    Includes dynamic pause logic to skip the automation if selected entities
    are in a specific state.

  domain: automation

  input:

    #################################################################
    # 0. Pause Logic Inputs (Top of UI)
    #################################################################

    pause_entities:
      name: Pause if these entities are in a specific state
      description: >
        Select one or more entities. If they match the pause state,
        the automation will be skipped.
      selector:
        entity:
          multiple: true

    pause_state:
      name: Pause state
      description: >
        If any/all selected entities are in this state, the automation will pause.
      default: "on"
      selector:
        text:

    pause_logic:
      name: Pause logic
      description: >
        Choose whether ANY or ALL selected entities must match the pause state.
      default: "any"
      selector:
        select:
          options:
            - any
            - all

    #################################################################
    # 1. Doorbell Inputs
    #################################################################

    doorbell_trigger:
      name: Doorbell Trigger (ding)
      selector:
        entity:
          domain: binary_sensor

    snapshot_switch:
      name: Snapshot Trigger Switch
      selector:
        entity:
          domain: switch

    camera_entity:
      name: Doorbell Camera
      selector:
        entity:
          domain: camera

    sonos_group:
      name: Sonos Group
      selector:
        entity:
          domain: media_player

    sonos_volume:
      name: Sonos Volume
      default: 0.35
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: slider

    phone_notify_service:
      name: Phone Notify Service
      description: >
        Example:
        notify.mobile_app_pixel_9_pro
      default: ""
      selector:
        text:

    tts_engine:
      name: TTS Engine
      selector:
        entity:
          domain: tts

    chime_file:
      name: Chime File (optional)
      description: >
        Example:
        media-source://media_source/local/chime.mp3
      default: ""
      selector:
        text:

    enable_tv_overlay:
      name: Enable TvOverlay notification
      default: true
      selector:
        boolean:

mode: single

trigger:
  - platform: state
    entity_id: !input doorbell_trigger
    to: "on"

action:

  #################################################################
  # 0. Pause Logic (Skip Automation)
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {% set entities = iif((!input pause_entities) is string, [!input pause_entities], !input pause_entities) %}
              {% if entities | length == 0 %}
                false
              {% else %}
                {% if !input pause_logic == 'any' %}
                  {{ entities | select('is_state', !input pause_state) | list | length > 0 }}
                {% else %}
                  {{ entities | select('is_state', !input pause_state) | list | length == entities | length }}
                {% endif %}
              {% endif %}
        sequence:
          - stop: "Automation paused because a selected entity is in the pause state."

  #################################################################
  # 1. Trigger snapshot switch
  #################################################################

  - service: switch.turn_on
    target:
      entity_id: !input snapshot_switch

  #################################################################
  # 2. Wait for camera/snapshot generation
  #################################################################

  - delay: "00:00:06"

  #################################################################
  # 3. Save snapshot
  #################################################################

  - service: camera.snapshot
    target:
      entity_id: !input camera_entity
    data:
      filename: "/config/www/temp/doorbell_snapshot.jpg"

  #################################################################
  # 4. Variables
  #################################################################

  - variables:
      chime_file_value: !input chime_file
      phone_notify_target: !input phone_notify_service
      enable_tv_overlay_flag: !input enable_tv_overlay
      sonos_entity: !input sonos_group

      original_sonos_volume: >
        {{ state_attr(sonos_entity, 'volume_level') | default(0.35) }}

      image_path: >
        https://nointernet.au/local/temp/doorbell_snapshot.jpg

  #################################################################
  # 5. Optional chime
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ chime_file_value | default('') | length > 0 }}
        sequence:
          - service: media_player.play_media
            target:
              entity_id: !input sonos_group
            data:
              media_content_id: "{{ chime_file_value }}"
              media_content_type: music

  #################################################################
  # 6. Set Sonos volume
  #################################################################

  - service: media_player.volume_set
    target:
      entity_id: !input sonos_group
    data:
      volume_level: !input sonos_volume

  #################################################################
  # 7. TTS announcement with retry (Option A)
  #################################################################

  - repeat:
      count: 2
      sequence:

        - service: tts.speak
          target:
            entity_id: !input tts_engine
          data:
            cache: true
            media_player_entity_id: !input sonos_group
            message: "Someone is at the front door"
            language: en-US

        - delay: "00:00:01.5"

        - choose:
            - conditions:
                - condition: template
                  value_template: >
                    {{ is_state(sonos_entity, 'playing') }}
              sequence:
                - stop: "TTS succeeded"

  #################################################################
  # 8. Restore Sonos volume
  #################################################################

  - delay: "00:00:02"

  - service: media_player.volume_set
    target:
      entity_id: !input sonos_group
    data:
      volume_level: "{{ original_sonos_volume }}"

  #################################################################
  # 9. Phone notification
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ phone_notify_target | default('') | length > 0 }}
        sequence:
          - service: "{{ phone_notify_target }}"
            data:
              title: "Front Door Alert"
              message: "Someone is at the front door"
              data:
                image: "{{ image_path }}"

  #################################################################
  # 10. TvOverlay notification
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ enable_tv_overlay_flag }}
        sequence:
          - service: rest_command.tvoverlay_doorbell
            data:
              image_path: "{{ image_path }}"
