blueprint:
  name: Doorbell - Multi Device Alert System (v2.1.5)
  description: >
    Sends snapshot, optional speaker chime and single-shot TTS, optional phone
    notification, and optional TV overlay notification with adjustable display
    duration when the doorbell is triggered by ding, motion, or person detection.
    Includes a dynamic pause condition using Home Assistant's native condition selector.
    v2.1.5 adds support for multiple phone notify targets via comma-separated list,
    each notified independently so one failure does not block others.

  domain: automation

  input:

    #################################################################
    # 0. Base URL
    #################################################################

    base_url:
      name: Home Assistant Base URL
      description: "Example: http://homeassistant.local:8123"
      default: "http://homeassistant.local:8123"
      selector:
        text:

    #################################################################
    # 1. Pause Logic
    #################################################################

    pause_condition:
      name: Pause - Condition to pause automation
      default: []
      selector:
        condition:

    #################################################################
    # 2. Trigger Inputs (Ding, Motion, Person)
    #################################################################

    doorbell_trigger:
      name: Doorbell - Ding sensor
      description: >
        Binary sensor that fires when the doorbell button is pressed.
      default: []
      selector:
        entity:
          domain: binary_sensor

    motion_trigger:
      name: Doorbell - Motion sensor
      description: >
        Binary sensor that fires when motion is detected.
      default: []
      selector:
        entity:
          domain: binary_sensor

    person_trigger:
      name: Doorbell - Person detection sensor
      description: >
        Binary sensor that fires when a person is detected.
      default: []
      selector:
        entity:
          domain: binary_sensor

    #################################################################
    # 3. Snapshot Inputs
    #################################################################

    snapshot_switch:
      name: Snapshot - Trigger switch
      selector:
        entity:
          domain: switch

    camera_entity:
      name: Snapshot - Camera entity
      selector:
        entity:
          domain: camera

    #################################################################
    # 4. Speaker Announcement
    #################################################################

    speaker_enable:
      name: Speaker - Enable announcement
      default: true
      selector:
        boolean:

    speaker_targets:
      name: Speaker - Media players
      selector:
        entity:
          domain: media_player
          multiple: true

    speaker_tts_engine:
      name: Speaker - TTS engine
      selector:
        entity:
          domain: tts

    speaker_tts_message:
      name: Speaker - TTS message
      default: Someone is at the front door
      selector:
        text:
          multiline: true

    speaker_volume:
      name: Speaker - Volume level
      default: 0.35
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: slider

    speaker_chime_enable:
      name: Speaker - Enable chime
      default: false
      selector:
        boolean:

    speaker_chime_file:
      name: Speaker - Chime file
      default: ""
      selector:
        text:
          multiline: true

    speaker_chime_duration:
      name: Speaker - Chime duration (seconds)
      description: >
        How long to wait for the chime to finish before playing TTS.
        Adjust to match your chime file length.
      default: 3
      selector:
        number:
          min: 1
          max: 30
          step: 1
          mode: slider

    #################################################################
    # 5. Phone Notification
    #################################################################

    phone_enable:
      name: Phone - Enable notification
      default: true
      selector:
        boolean:

    phone_notify_service:
      name: Phone - Notify service(s)
      description: >
        Enter one or more notify service names, comma-separated.
        Example: notify.mobile_app_johns_phone, notify.mobile_app_janes_phone
      default: ""
      selector:
        text:
          multiline: true

    phone_title:
      name: Phone - Notification title
      default: Front Door Alert
      selector:
        text:
          multiline: true

    phone_message:
      name: Phone - Notification message
      default: Someone is at the front door
      selector:
        text:
          multiline: true

    phone_include_snapshot:
      name: Phone - Include snapshot
      default: true
      selector:
        boolean:

    #################################################################
    # 6. TV Overlay
    #################################################################

    tv_enable:
      name: TV - Enable overlay
      default: true
      selector:
        boolean:

    tv_caption:
      name: TV - Caption
      default: Someone is at the front door
      selector:
        text:
          multiline: true

    tv_include_snapshot:
      name: TV - Include snapshot
      default: true
      selector:
        boolean:

    tv_duration:
      name: TV - Display duration (seconds)
      default: 10
      selector:
        number:
          min: 1
          max: 60
          step: 1
          mode: slider

mode: queued
max: 2

#################################################################
#  TRIGGERS — Ding OR Motion OR Person
#################################################################

trigger:
  - platform: state
    entity_id: !input doorbell_trigger
    to: "on"

  - platform: state
    entity_id: !input motion_trigger
    to: "on"

  - platform: state
    entity_id: !input person_trigger
    to: "on"

action:

  #################################################################
  # 0. Pause Logic
  #################################################################

  - choose:
      - conditions: !input pause_condition
        sequence:
          - stop: Automation paused because the pause condition matched.

  #################################################################
  # 1. Trigger snapshot switch
  #################################################################

  - service: switch.turn_on
    target:
      entity_id: !input snapshot_switch

  #################################################################
  # 2. Wait for snapshot routine
  #################################################################

  - delay: 00:00:06

  #################################################################
  # 3. Save snapshot
  #################################################################

  - service: camera.snapshot
    target:
      entity_id: !input camera_entity
    data:
      filename: /config/www/temp/doorbell_snapshot.jpg

  #################################################################
  # 4. Turn off snapshot switch
  #################################################################

  - continue_on_error: true
    sequence:
      - service: switch.turn_off
        target:
          entity_id: !input snapshot_switch

  #################################################################
  # 5. Variables
  #################################################################

  - variables:
      base_url: !input base_url

      speaker_enable_flag: !input speaker_enable
      speaker_targets_list: !input speaker_targets
      speaker_tts_engine_entity: !input speaker_tts_engine
      speaker_tts_message_value: !input speaker_tts_message
      speaker_volume_value: !input speaker_volume
      speaker_chime_enable_flag: !input speaker_chime_enable
      speaker_chime_file_value: !input speaker_chime_file
      speaker_chime_duration_value: !input speaker_chime_duration

      phone_enable_flag: !input phone_enable
      phone_notify_target: !input phone_notify_service
      phone_title_value: !input phone_title
      phone_message_value: !input phone_message
      phone_include_snapshot_flag: !input phone_include_snapshot

      tv_enable_flag: !input tv_enable
      tv_caption_value: !input tv_caption
      tv_include_snapshot_flag: !input tv_include_snapshot
      tv_duration_value: !input tv_duration

      primary_speaker: >
        {% set s = speaker_targets_list %}
        {% if s is string %}
          {{ s }}
        {% elif s is iterable and s | length > 0 %}
          {{ s[0] }}
        {% else %}
          {{ "" }}
        {% endif %}

      # Safe volume restore — default() does not catch None returned
      # by state_attr() for unavailable/off entities, so we check explicitly.
      original_speaker_volume: >
        {% if primary_speaker != "" %}
          {% set vol = state_attr(primary_speaker, "volume_level") %}
          {{ vol if vol is not none and vol | float(-1) >= 0 else 0.35 }}
        {% else %}
          0.35
        {% endif %}

      # Dynamic snapshot URL with cache-buster
      image_path: >
        {{ base_url ~ '/local/temp/doorbell_snapshot.jpg?' ~ now().timestamp() }}

      # Parse comma-separated notify services into a list
      phone_notify_targets: >
        {% if phone_notify_target | length > 0 %}
          {{ phone_notify_target.split(',') | map('trim') | list }}
        {% else %}
          {{ [] }}
        {% endif %}

  #################################################################
  # 6. Speaker Announcement (Single-shot TTS)
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ speaker_enable_flag and primary_speaker != '' }}"
        sequence:

          # Set temporary volume
          - continue_on_error: true
            sequence:
              - service: media_player.volume_set
                target:
                  entity_id: "{{ speaker_targets_list }}"
                data:
                  volume_level: "{{ speaker_volume_value }}"

          # Optional chime — plays first, then waits before TTS
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ speaker_chime_enable_flag and speaker_chime_file_value | length > 0 }}
                sequence:
                  - continue_on_error: true
                    sequence:
                      - service: media_player.play_media
                        target:
                          entity_id: "{{ speaker_targets_list }}"
                        data:
                          media_content_id: "{{ speaker_chime_file_value }}"
                          media_content_type: music
                  # Wait for chime to finish before TTS
                  - delay:
                      seconds: "{{ speaker_chime_duration_value }}"

          # Single TTS attempt
          - continue_on_error: true
            sequence:
              - service: tts.speak
                target:
                  entity_id: "{{ speaker_tts_engine_entity }}"
                data:
                  cache: true
                  media_player_entity_id: "{{ speaker_targets_list }}"
                  message: "{{ speaker_tts_message_value }}"
                  language: en-US

          # Allow TTS playback to start before restoring volume
          - delay: 00:00:03

          # Restore original volume — float() filter as secondary safety net
          - continue_on_error: true
            sequence:
              - service: media_player.volume_set
                target:
                  entity_id: "{{ speaker_targets_list }}"
                data:
                  volume_level: "{{ original_speaker_volume | float(0.35) }}"

  #################################################################
  # 7. Phone Notification
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ phone_enable_flag and phone_notify_targets | length > 0 }}
        sequence:
          - repeat:
              for_each: "{{ phone_notify_targets }}"
              sequence:
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ phone_include_snapshot_flag }}"
                      sequence:
                        - continue_on_error: true
                          sequence:
                            - service: "{{ repeat.item }}"
                              data:
                                title: "{{ phone_title_value }}"
                                message: "{{ phone_message_value }}"
                                data:
                                  image: "{{ image_path }}"
                  default:
                    - continue_on_error: true
                      sequence:
                        - service: "{{ repeat.item }}"
                          data:
                            title: "{{ phone_title_value }}"
                            message: "{{ phone_message_value }}"

  #################################################################
  # 8. TV Overlay
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ tv_enable_flag }}"
        sequence:

          # Small delay to ensure snapshot is fully written
          - delay: 00:00:01

          # With snapshot
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ tv_include_snapshot_flag }}"
                sequence:
                  - continue_on_error: true
                    sequence:
                      - service: rest_command.tvoverlay_doorbell
                        data:
                          caption: "{{ tv_caption_value }}"
                          image_path: "{{ image_path }}"
                          duration: "{{ tv_duration_value | int }}"

            # Without snapshot
            default:
              - continue_on_error: true
                sequence:
                  - service: rest_command.tvoverlay_doorbell
                    data:
                      caption: "{{ tv_caption_value }}"
                      image_path: ""
                      duration: "{{ tv_duration_value | int }}"
