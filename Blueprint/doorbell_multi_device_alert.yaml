blueprint:
  name: Doorbell - Multi Device Alert System
  description: >
    Sends snapshot, optional speaker chime and TTS with smart retry, optional
    phone notification, and optional TV overlay notification when the doorbell
    is triggered. Includes a dynamic pause condition using Home Assistant's
    native condition selector.

  domain: automation

  input:

    #################################################################
    # 0. Pause Logic
    #################################################################

    pause_condition:
      name: Pause - Condition to pause automation
      description: >
        If this condition evaluates to true, the automation will be skipped.
      default: []
      selector:
        condition:

    #################################################################
    # 1. Doorbell and Snapshot Inputs
    #################################################################

    doorbell_trigger:
      name: Doorbell - Trigger sensor
      description: >
        The binary sensor that represents your doorbell ding event.
      selector:
        entity:
          domain: binary_sensor

    snapshot_switch:
      name: Snapshot - Trigger switch
      description: >
        A switch or helper that triggers your camera snapshot routine.
      selector:
        entity:
          domain: switch

    camera_entity:
      name: Snapshot - Camera entity
      description: >
        The camera entity used to capture the snapshot.
      selector:
        entity:
          domain: camera

    #################################################################
    # 2. Speaker Announcement
    #################################################################

    speaker_enable:
      name: Speaker - Enable announcement
      description: >
        Enable a spoken announcement on one or more media players.
      default: true
      selector:
        boolean:

    speaker_targets:
      name: Speaker - Media players
      description: >
        One or more media players that will play the chime and TTS message.
      selector:
        entity:
          domain: media_player
          multiple: true

    speaker_tts_engine:
      name: Speaker - TTS engine
      description: >
        The TTS engine to use for the spoken announcement.
      selector:
        entity:
          domain: tts

    speaker_tts_message:
      name: Speaker - TTS message
      description: >
        The text that will be spoken. Templating is allowed.
      default: Someone is at the front door
      selector:
        text:
          multiline: true

    speaker_volume:
      name: Speaker - Volume level
      description: >
        Temporary volume level to set during the announcement.
      default: 0.35
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: slider

    speaker_chime_enable:
      name: Speaker - Enable chime
      description: >
        Play a chime sound before the TTS message.
      default: false
      selector:
        boolean:

    speaker_chime_file:
      name: Speaker - Chime file
      description: >
        Media file to play as a chime. Templating allowed.
      default: ""
      selector:
        text:
          multiline: true

    #################################################################
    # 3. Phone Notification
    #################################################################

    phone_enable:
      name: Phone - Enable notification
      description: >
        Send a notification to your phone when the doorbell is pressed.
      default: true
      selector:
        boolean:

    phone_notify_service:
      name: Phone - Notify service
      description: >
        The notify service for your phone.
      default: ""
      selector:
        text:

    phone_title:
      name: Phone - Notification title
      description: >
        Title of the phone notification. Templating allowed.
      default: Front Door Alert
      selector:
        text:
          multiline: true

    phone_message:
      name: Phone - Notification message
      description: >
        Body of the phone notification. Templating allowed.
      default: Someone is at the front door
      selector:
        text:
          multiline: true

    phone_include_snapshot:
      name: Phone - Include snapshot
      description: >
        Attach the snapshot image to the phone notification.
      default: true
      selector:
        boolean:

    #################################################################
    # 4. TV Overlay
    #################################################################

    tv_enable:
      name: TV - Enable overlay
      description: >
        Send a TV overlay notification to supported TVs.
      default: true
      selector:
        boolean:

    tv_caption:
      name: TV - Caption
      description: >
        Caption text to display on the TV overlay. Templating allowed.
      default: Someone is at the front door
      selector:
        text:
          multiline: true

    tv_include_snapshot:
      name: TV - Include snapshot
      description: >
        Include the snapshot image in the TV overlay.
      default: true
      selector:
        boolean:

mode: single

trigger:
  - platform: state
    entity_id: !input doorbell_trigger
    to: "on"

action:

  #################################################################
  # 0. Pause Logic
  #################################################################

  - choose:
      - conditions: !input pause_condition
        sequence:
          - stop: Automation paused because the pause condition matched.

  #################################################################
  # 1. Trigger snapshot switch
  #################################################################

  - service: switch.turn_on
    target:
      entity_id: !input snapshot_switch

  #################################################################
  # 2. Wait for snapshot
  #################################################################

  - delay: 00:00:06

  #################################################################
  # 3. Save snapshot
  #################################################################

  - service: camera.snapshot
    target:
      entity_id: !input camera_entity
    data:
      filename: /config/www/temp/doorbell_snapshot.jpg

  #################################################################
  # 4. Variables
  #################################################################

  - variables:
      speaker_enable_flag: !input speaker_enable
      speaker_targets_list: !input speaker_targets
      speaker_tts_engine_entity: !input speaker_tts_engine
      speaker_tts_message_value: !input speaker_tts_message
      speaker_volume_value: !input speaker_volume
      speaker_chime_enable_flag: !input speaker_chime_enable
      speaker_chime_file_value: !input speaker_chime_file

      phone_enable_flag: !input phone_enable
      phone_notify_target: !input phone_notify_service
      phone_title_value: !input phone_title
      phone_message_value: !input phone_message
      phone_include_snapshot_flag: !input phone_include_snapshot

      tv_enable_flag: !input tv_enable
      tv_caption_value: !input tv_caption
      tv_include_snapshot_flag: !input tv_include_snapshot

      primary_speaker: >
        {% set s = speaker_targets_list %}
        {% if s is string %}
          {{ s }}
        {% elif s is iterable and s | length > 0 %}
          {{ s[0] }}
        {% else %}
          {{ "" }}
        {% endif %}

      original_speaker_volume: >
        {% if primary_speaker != "" %}
          {{ state_attr(primary_speaker, "volume_level") | default(0.35) }}
        {% else %}
          0.35
        {% endif %}

      image_path: >
        http://192.168.20.10:8123/local/temp/doorbell_snapshot.jpg

  #################################################################
  # 5. Speaker Announcement
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ speaker_enable_flag and primary_speaker != '' }}"
        sequence:

          # Optional chime
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ speaker_chime_enable_flag and speaker_chime_file_value | length > 0 }}
                sequence:
                  - service: media_player.play_media
                    target:
                      entity_id: "{{ speaker_targets_list }}"
                    data:
                      media_content_id: "{{ speaker_chime_file_value }}"
                      media_content_type: music

          # Set volume
          - service: media_player.volume_set
            target:
              entity_id: "{{ speaker_targets_list }}"
            data:
              volume_level: "{{ speaker_volume_value }}"

          # TTS with smart retry
          - repeat:
              count: 2
              sequence:

                - service: tts.speak
                  target:
                    entity_id: "{{ speaker_tts_engine_entity }}"
                  data:
                    cache: true
                    media_player_entity_id: "{{ speaker_targets_list }}"
                    message: "{{ speaker_tts_message_value }}"
                    language: en-US

                - delay: 00:00:03

                - choose:
                    - conditions:
                        - condition: template
                          value_template: >
                            {{ states(primary_speaker) in [
                              'playing',
                              'buffering',
                              'transitioning'
                            ] }}
                      sequence:
                        - stop: TTS succeeded

          # Restore volume
          - delay: 00:00:02

          - service: media_player.volume_set
            target:
              entity_id: "{{ speaker_targets_list }}"
            data:
              volume_level: "{{ original_speaker_volume }}"

  #################################################################
  # 6. Phone Notification
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ phone_enable_flag and phone_notify_target | length > 0 }}
        sequence:

          # With snapshot
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ phone_include_snapshot_flag }}"
                sequence:
                  - service: "{{ phone_notify_target }}"
                    data:
                      title: "{{ phone_title_value }}"
                      message: "{{ phone_message_value }}"
                      data:
                        image: "{{ image_path }}"

            # Without snapshot
            default:
              - service: "{{ phone_notify_target }}"
                data:
                  title: "{{ phone_title_value }}"
                  message: "{{ phone_message_value }}"

  #################################################################
  # 7. TV Overlay
  #################################################################

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ tv_enable_flag }}"
        sequence:

          # With snapshot
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ tv_include_snapshot_flag }}"
                sequence:
                  - service: rest_command.tvoverlay_doorbell
                    data:
                      caption: "{{ tv_caption_value }}"
                      image_path: "{{ image_path }}"

            # Without snapshot
            default:
              - service: rest_command.tvoverlay_doorbell
                data:
                  caption: "{{ tv_caption_value }}"
                  image_path: ""
