blueprint:
  name: Doorbell - Multi-Device Alert System (TvOverlay, UI-Safe)
  description: >
    Sends snapshot, Sonos chime + TTS, phone notification, and TvOverlay
    notification on the TV when the doorbell is triggered.
  domain: automation

  input:
    doorbell_trigger:
      name: Doorbell Trigger (ding)
      selector:
        entity:
          domain: binary_sensor

    snapshot_switch:
      name: Snapshot Trigger Switch
      selector:
        entity:
          domain: switch

    camera_entity:
      name: Doorbell Camera
      selector:
        entity:
          domain: camera

    sonos_group:
      name: Sonos Group
      selector:
        entity:
          domain: media_player

    sonos_volume:
      name: Sonos Volume
      default: 0.35
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
          mode: slider

    phone_notify_service:
      name: Phone Notify Service
      selector:
        text:

    tts_engine:
      name: TTS Engine
      selector:
        entity:
          domain: tts

    chime_file:
      name: Chime File (optional)
      default: ""
      selector:
        text:

    enable_tv_overlay:
      name: Enable TvOverlay notification
      default: true
      selector:
        boolean:

mode: single

trigger:
  - platform: state
    entity_id: !input doorbell_trigger
    to: "on"

action:

  # 1. Trigger snapshot
  - service: switch.turn_on
    target:
      entity_id: !input snapshot_switch

  - delay: "00:00:04"

  - service: camera.snapshot
    target:
      entity_id: !input camera_entity
    data:
      filename: "/media/doorbell/doorbell_snapshot.jpg"

  # 2. Variables
  - variables:
      chime_file_value: !input chime_file
      phone_notify_target: !input phone_notify_service
      enable_tv_overlay_flag: !input enable_tv_overlay
      sonos_entity: !input sonos_group
      original_sonos_volume: "{{ state_attr(sonos_entity, 'volume_level') }}"
      image_path: "/media/local/doorbell/doorbell_snapshot.jpg"

  # 3. Optional chime
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ chime_file_value | length > 0 }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: !input sonos_group
            data:
              media_content_id: "{{ chime_file_value }}"
              media_content_type: music

  # 4. Set Sonos volume
  - service: media_player.volume_set
    target:
      entity_id: !input sonos_group
    data:
      volume_level: !input sonos_volume

  # 5. TTS announcement
  - service: tts.speak
    target:
      entity_id: !input tts_engine
    data:
      cache: true
      media_player_entity_id: !input sonos_group
      message: "Someone is at the front door"
      language: en-US

  # 6. Restore Sonos volume
  - delay: "00:00:02"
  - service: media_player.volume_set
    target:
      entity_id: !input sonos_group
    data:
      volume_level: "{{ original_sonos_volume }}"

  # 7. Phone notification
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ phone_notify_target is string and phone_notify_target | length > 0 }}
        sequence:
          - service: "{{ phone_notify_target }}"
            data:
              title: "Front Door Alert"
              message: "Someone is at the front door"
              data:
                image: "{{ image_path }}"

  # 8. TvOverlay notification
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_tv_overlay_flag }}"
        sequence:
          - service: rest_command.tvoverlay_doorbell
            data:
              image_path: "{{ image_path }}"
