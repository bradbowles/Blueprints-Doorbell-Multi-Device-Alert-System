blueprint:
  name: Doorbell - Multi-Device Alert System
  description: >
    Sends snapshot, Sonos chime + TTS, phone notification, TV image notification,
    and optional PiP-style overlay when the doorbell is triggered.
  domain: automation

  input:
    doorbell_trigger:
      name: Doorbell Trigger (ding)
      selector:
        entity:
          domain: binary_sensor

    snapshot_switch:
      name: Snapshot Trigger Switch
      selector:
        entity:
          domain: switch

    camera_entity:
      name: Doorbell Camera
      selector:
        entity:
          domain: camera

    sonos_group:
      name: Sonos Group
      selector:
        entity:
          domain: media_player

    phone_notify_service:
      name: Phone Notify Service (e.g. notify.mobile_app_brads_fold_6)
      selector:
        text:

    tv_group:
      name: TV Media Player Group
      selector:
        entity:
          domain: media_player

    tts_engine:
      name: TTS Engine
      selector:
        entity:
          domain: tts

    chime_file:
      name: Chime File (optional, /local path)
      default: ""
      selector:
        text:

    enable_pip:
      name: Enable PiP-style Overlay (HTML page cast)
      default: false
      selector:
        boolean:

mode: single

trigger:
  - platform: state
    entity_id: !input doorbell_trigger
    to: "on"

action:

  # 1. Trigger snapshot
  - service: switch.turn_on
    target:
      entity_id: !input snapshot_switch

  - delay: "00:00:04"

  - service: camera.snapshot
    target:
      entity_id: !input camera_entity
    data:
      filename: "/config/www/temp/doorbell_snapshot.jpg"

  - service: shell_command.fix_doorbell_snapshot

  # 2. Prepare dynamic variables
  - variables:
      snapshot_url: "/local/temp/doorbell_snapshot.jpg?{{ now().timestamp() }}"
      tvs: >
        {{ expand(states[inputs.tv_group].entity_id)
           | selectattr('state','eq','on')
           | selectattr('state','ne','unavailable')
           | map(attribute='entity_id')
           | list }}

  # 3. Optional chime
  - choose:
      - conditions: "{{ (inputs.chime_file | length) > 0 }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: !input sonos_group
            data:
              media_content_id: "{{ inputs.chime_file }}"
              media_content_type: music

  # 4. Sonos TTS announcement
  - service: tts.speak
    target:
      entity_id: !input tts_engine
    data:
      cache: true
      media_player_entity_id: !input sonos_group
      message: "Someone is at the front door"
      language: en-au

  # 5. Phone notification
  - service: "{{ inputs.phone_notify_service }}"
    data:
      title: "Front Door Alert"
      message: "Someone is at the front door"
      data:
        image: "{{ snapshot_url }}"
        clickAction: "/our-home/security"

  # 6. TV image notification
  - choose:
      - conditions: "{{ tvs | count > 0 }}"
        sequence:
          - repeat:
              for_each: "{{ tvs }}"
              sequence:
                - service: notify.notify
                  data:
                    target: "{{ repeat.item }}"
                    data:
                      image: "{{ snapshot_url }}"

  # 7. PiP overlay (optional)
  - choose:
      - conditions: "{{ inputs.enable_pip and (tvs | count > 0) }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: "{{ tvs }}"
            data:
              media_content_id: "/local/pip.html?img={{ snapshot_url }}"
              media_content_type: url
